spring:
  application:
    name: prediction-service
  profiles:
    active: dev
  config:
    import:
      - nacos:atbs-common
#      - nacos:${spring.application.name}
  cloud:
    nacos:
      server-addr: 103.115.43.55:8848
      username: nacos
      password: nacos_040329
      config:
        namespace: 80338282-5c6a-4b82-89d4-5c90adfd6997
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        namespace: 80338282-5c6a-4b82-89d4-5c90adfd6997
        group: DEFAULT_GROUP
        enabled: true

server:
  host: 0.0.0.0
  port: 8085

prediction:
  default-days: 20
  max-days: 365
  confidence-level: 0.95

# 自动重训配置
auto-retrain:
  enabled: true                    # 是否启用自动重训
  schedule-time: "02:00"           # 每日执行时间 (HH:MM)
  retrain-cycle-days: 7            # 重训周期（天）
  order-service-name: "order-service"  # Order服务名（用于Nacos服务发现）
  data-file: "bus_data.csv"        # 数据文件名
  max-data-rows: 145               # 最大数据行数（滚动窗口大小）
  use-grid-search: true            # 是否使用网格搜索
  scoring: "mape"                  # 评分指标

logging:
  level:
    root: DEBUG
    top.flowerstardream.base: DEBUG
    top.flowerstardream.atbs: DEBUG
    org.springframework.web: DEBUG
    com.alibaba.cloud.nacos: INFO
  file:
    enabled: true
    path: logs/${spring.application.name}
    name: ${spring.application.name}.log
    history-pattern: ${spring.application.name}-%d{yyyy-MM-dd}.log
    max-history: 30
