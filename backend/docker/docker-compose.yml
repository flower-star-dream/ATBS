networks:
  backend-network:
    driver: bridge

services:
  # 网关服务
  atbs-gateway:
    build:
      context: ../atbs-gateway
      dockerfile: docker/Dockerfile
    container_name: atbs-gateway
    image: atbs/atbs-gateway:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8080:8080"
    networks:
      - backend-network
    

  # 认证服务
  auth-service:
    build:
      context: ../auth-service
      dockerfile: docker/Dockerfile
    container_name: auth-service
    image: atbs/auth-service:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8081:8081"
    networks:
      - backend-network
    

  # 用户服务
  user-service:
    build:
      context: ../user-service
      dockerfile: docker/Dockerfile
    container_name: user-service
    image: atbs/user-service:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8082:8082"
    networks:
      - backend-network
    

  # 订单服务
  order-service:
    build:
      context: ../order-service
      dockerfile: docker/Dockerfile
    container_name: order-service
    image: atbs/order-service:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8083:8083"
    networks:
      - backend-network
    

  # 航班服务
  airplane-service:
    build:
      context: ../airplane-service
      dockerfile: docker/Dockerfile
    container_name: airplane-service
    image: atbs/airplane-service:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "8084:8084"
    networks:
      - backend-network
    